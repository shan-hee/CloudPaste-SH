name: Deploy Worker

on:
  workflow_dispatch:
  repository_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21.x'
          cache: 'npm'
      
      - name: Install Dependencies
        run: |
          npm ci
          npm install -g wrangler
      
      - name: Configure Wrangler
        run: |
          mkdir -p ~/.wrangler
          
          cat > ~/.wrangler/config.toml << EOF
          api_token = "${{ secrets.CF_API_TOKEN }}"
          account_id = "${{ secrets.CF_ACCOUNT_ID }}"
          EOF
          
          wrangler whoami
      
      - name: Cache Wrangler
        uses: actions/cache@v4
        with:
          path: |
            ~/.wrangler
            ~/.npm
          key: ${{ runner.os }}-wrangler-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-wrangler-
      
      - name: Deploy Worker
        run: npm run deploy

      - name: Initialize Database
        run: |
          # 创建初始化 SQL 文件
          cat > init.sql << EOF
          -- 创建分享表
          CREATE TABLE IF NOT EXISTS shares (
              id TEXT PRIMARY KEY,
              type TEXT NOT NULL,
              content TEXT,
              filename TEXT,
              description TEXT,
              password TEXT,
              max_views INTEGER DEFAULT 0,
              views INTEGER DEFAULT 0,
              created_at INTEGER NOT NULL,
              expires_at INTEGER,
              file_size INTEGER,
              original_name TEXT,
              mimetype TEXT
          );

          -- 创建会话表
          CREATE TABLE IF NOT EXISTS sessions (
              id TEXT PRIMARY KEY,
              username TEXT NOT NULL,
              created_at INTEGER NOT NULL,
              expires_at INTEGER NOT NULL
          );

          -- 创建设置表
          CREATE TABLE IF NOT EXISTS settings (
              key TEXT PRIMARY KEY,
              value TEXT NOT NULL
          );

          -- 初始化默认设置
          INSERT OR REPLACE INTO settings (key, value)
          VALUES 
              ('textUploadEnabled', 'true'),
              ('fileUploadEnabled', 'true');
          EOF

          # 使用 wrangler d1 执行 SQL
          echo "正在初始化数据库..."
          wrangler d1 execute cloudpaste --file=init.sql
